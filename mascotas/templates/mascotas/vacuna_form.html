{% extends 'mascotas/base.html' %}
{% block titulo %}Agregar Vacuna{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4><i class="bi bi-capsule"></i> Registrar vacuna para <strong>{{ mascota.nombre }}</strong></h4>
            <form method="post" class="mt-3">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                </div>
                {% endfor %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Guardar</button>
                    <a href="{% url 'mascotas:detalle' mascota.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
