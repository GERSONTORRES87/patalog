{% extends 'mascotas/base.html' %}
{% block titulo %}Eliminar Vacuna{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <h4>¿Eliminar este registro de vacuna?</h4>
            <p class="text-muted"><strong>{{ registro.mascota.nombre }}</strong> - {{ registro.vacuna.nombre }} ({{ registro.fecha_aplicacion }})</p>
            <form method="post" class="d-flex gap-2 justify-content-center mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'mascotas:detalle' registro.mascota.pk %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
