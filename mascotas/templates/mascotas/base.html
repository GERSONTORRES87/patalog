<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PataLog - {% block titulo %}Registro de Vacunas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .btn-primary { background-color: #4a90d9; border-color: #4a90d9; }
        .badge-perro { background-color: #d4a96a; color: white; }
        .badge-gato { background-color: #9b8ea6; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'mascotas:inicio' %}">🐾 PataLog</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'mascotas:inicio' %}"><i class="bi bi-house"></i> Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'mascotas:lista' %}"><i class="bi bi-list-ul"></i> Mascotas</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'mascotas:crear' %}"><i class="bi bi-plus-circle"></i> Nueva Mascota</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/"><i class="bi bi-gear"></i> Admin</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="{% url 'mascotas:logout' %}"><i class="bi bi-box-arrow-right"></i> Salir</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
    {% block contenido %}{% endblock %}
</div>

<footer class="text-center text-muted mt-5 py-3">
    <small>PataLog &copy; 2025 - Registro de Vacunas de Mascotas</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
